# ============================================================
# Production Docker Compose — Full stack deployment
# PostgreSQL + Redis + n8n + API + Nginx
# ============================================================

services:
  # ─── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: visa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: visa_workflow
      POSTGRES_USER: visa_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-visa_secure_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visa_admin -d visa_workflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visa-network

  # ─── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: visa-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_2024} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visa-network

  # ─── Visa API ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visa-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://visa_admin:${DB_PASSWORD:-visa_secure_2024}@postgres:5432/visa_workflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_2024}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_reports:/app/reports
      - api_screenshots:/app/screenshots
      - api_logs:/app/logs
    networks:
      - visa-network

  # ─── Nginx Reverse Proxy ───────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: visa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - visa-network

  # ─── n8n Workflow Automation ────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: visa-n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-n8n_secure_2024}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: visa_workflow
      DB_POSTGRESDB_USER: visa_admin
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-visa_secure_2024}
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - visa-network

  # ─── Prometheus Monitoring ──────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: visa-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - visa-network

  # ─── Grafana Dashboard ─────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: visa-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secure_2024}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - visa-network

volumes:
  postgres_data:
  redis_data:
  api_reports:
  api_screenshots:
  api_logs:
  n8n_data:
  prometheus_data:
  grafana_data:

networks:
  visa-network:
    driver: bridge
