version: '3.9'

services:
  # ============================
  # PostgreSQL — Primary Database
  # ============================
  postgres:
    image: postgres:16-alpine
    container_name: visa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: visa_admin
      POSTGRES_PASSWORD: visa_secure_2024
      POSTGRES_DB: visa_workflow
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U visa_admin -d visa_workflow']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================
  # Redis — Cache, Queue, Sessions
  # ============================
  redis:
    image: redis:7-alpine
    container_name: visa_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================
  # BullBoard — Queue Dashboard
  # ============================
  # (Served by the API server at /admin/queues)

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
