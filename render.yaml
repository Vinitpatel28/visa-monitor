databases:
  - name: visa-postgres
    plan: free
    databaseName: visa_monitor
    user: admin

services:
  # Cache Database (Redis)
  - type: redis
    name: visa-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  # 1. Backend Web API
  - type: web
    name: visa-backend
    env: node
    plan: free
    buildCommand: "npm install && npx prisma generate && npm run build"
    startCommand: "npx prisma db push && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: visa-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: visa-redis
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: ENCRYPTION_KEY
        value: "32-byte-hex-key-change-in-prod-00"
      - key: ENCRYPTION_IV
        value: "16-byte-iv-change"

  # 2. Frontend Next.js Dashboard
  - type: web
    name: visa-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NEXT_PUBLIC_API_HOST
        fromService:
          type: web
          name: visa-backend
          property: host
